<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento de Cortes</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <header class="topbar">

        <div class="topbar_logo">
            <div class="topbar__brand">
                <img src="assets/images/logos/barbearia-dark.png" alt="logo-barbearia">
                <div class="topbar__nome">Barbearia do Zé</div>
            </div>
        </div>
        <button class="btn__historico__agendamentos" id="btn-historico">
            <i class="botao hitorico"></i>
            Meus Agendamentos
        </button>

    </header>

    <main class="conteiner">

        <ol class="etapa" id="etapa">
            <li class="etapa__item ativo">
                <span class="etapa__ciclo">1</span>
                <span class="etapa__label">Serviço</span>
            </li>
            <li class="etapa__item">
                <span class="etapa__ciclo">2</span>
                <span class="etapa__label">Profissional</span>
            </li>
            <li class="etapa__item">
                <span class="etapa__ciclo">3</span>
                <span class="etapa__label">Horário</span>
            </li>
            <li class="etapa__item">
                <span class="etapa__ciclo">4</span>
                <span class="etapa__label">Confirmação</span>
            </li>
        </ol>

        <!-- Cortes de Cabelo -->
        <h1>Escolha o serviço:</h1>
        <section class="sequencia" id="lista-servico"></section>


        <!-- Seleção do Profissional -->
        <h1>Escolha o profissional:</h1>
        <section class="sequencia" id="lista-profissionais"></section>

        <img src="" alt="">

        <!-- Coleta do Nome do Cliente -->
        <h1>Confirme seu agendamento:</h1>
        <section>
            <form class="formulario" id="formulario" novalidate>
                <div class="campo">
                    <label for="inp-nome">Nome completo</label>
                    <input type="text" id="inp-nome" name="inputNome" autocomplete="off" placeholder="Digite seu nome...">
                    <span class="campo__erro" id="erro-nome"></span>
                </div>

                <div class="campo">
                    <label for="inp-tel">Telefone / WhatsApp</label>
                    <input type="tel" id="inp-tel" name="inputTel" autocomplete="off" placeholder="(00) 00000-0000">
                    <span class="campo__erro" id="erro-tel"></span>
                </div>

                <div class="campo">
                    <label for="inp-email">E-mail</label>
                    <input type="email" id="inp-email" name="inputEmail" autocomplete="off" placeholder="seuemail@exemplo.com">
                    <span class="campo__erro" id="erro-email"></span>
                </div>

                <div class="campo">
                    <label class="checkbox">
                        <input type="checkbox" id="inp-consentimento">
                        <span>Concordo com o uso dos meus dados para realizar este agendamento</span>
                    </label>
                    <span class="campo__erro" id="erro-consentimento"></span>
                </div>
            </form>
        </section>

        <nav class="nav-etapa">
            <button onclick="voltarEtapa()">Voltar</button>
            <button onclick="avancarEtapa()">Continuar</button>
        </nav>

    </main>
    <footer>
        <p>&copy Site de agendamento de serviços. Todos os diretos reservados.</p>
        <p>Para conhecer outros serviços <a href="../MyProjects/site-html/sobremim.html" target="_blank">clique aqui.</a></p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
