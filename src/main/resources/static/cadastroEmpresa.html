<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/admin.css">
    <title>Cadastro Empresa | Agenda System</title>
</head>
<body>
    <!-- ============================================================
     TELA 3: DADOS DA EMPRESA
     ============================================================ -->
    <div id="tela-empresa" class="tela ativa" hidden>
        <div class="auth-container auth-container--largo">
            <div class="passo-indicador">
                <span class="passo ativo">1. Empresa</span>
                <span class="passo-linha"></span>
                <span class="passo">2. Serviços</span>
                <span class="passo-linha"></span>
                <span class="passo">3. Profissionais</span>
            </div>

            <h1 class="tela__titulo">Dados da empresa</h1>
            <p class="tela__subtitulo">Preencha as informações do seu estabelecimento</p>

            <form id="form-empresa" class="form-auth" novalidate>
                <div class="campo">
                    <label for="emp-nome">Nome da empresa</label>
                    <input type="text" id="emp-nome" placeholder="Ex: Barbearia do Zé" autocomplete="off">
                    <span class="campo__erro" id="erro-emp-nome"></span>
                </div>
                <div class="campo">
                    <label for="emp-categoria">Categoria</label>
                    <select id="emp-categoria">
                        <option value="">Selecione uma categoria</option>
                        <option value="barbearia">Barbearia</option>
                        <option value="salao">Salão de beleza</option>
                        <option value="estetica">Estética</option>
                        <option value="clinica">Clínica</option>
                        <option value="outro">Outro</option>
                    </select>
                    <span class="campo__erro" id="erro-emp-categoria"></span>
                </div>
                <div class="campo">
                    <label for="emp-cnpj">CNPJ</label>
                    <input type="text" id="emp-cnpj" placeholder="00.000.000/0000-00" maxlength="18" autocomplete="off">
                    <span class="campo__erro" id="erro-emp-cnpj"></span>
                </div>
                <div class="campo">
                    <label>Horário de expediente</label>
                    <div class="expediente-grid">
                        <div class="campo">
                            <label for="emp-abertura">Abertura</label>
                            <input type="time" id="emp-abertura" value="09:00">
                        </div>
                        <div class="campo">
                            <label for="emp-fechamento">Fechamento</label>
                            <input type="time" id="emp-fechamento" value="18:00">
                        </div>
                    </div>
                </div>
                <div class="campo">
                    <label>Dias de funcionamento</label>
                    <div class="dias-semana" id="dias-semana">
                        <button type="button" class="dia-btn ativo" data-dia="seg">Seg</button>
                        <button type="button" class="dia-btn ativo" data-dia="ter">Ter</button>
                        <button type="button" class="dia-btn ativo" data-dia="qua">Qua</button>
                        <button type="button" class="dia-btn ativo" data-dia="qui">Qui</button>
                        <button type="button" class="dia-btn ativo" data-dia="sex">Sex</button>
                        <button type="button" class="dia-btn" data-dia="sab">Sáb</button>
                        <button type="button" class="dia-btn" data-dia="dom">Dom</button>
                    </div>
                </div>
                <button type="button" class="btn-primario" onclick="salvarEmpresa()">Próximo →</button>
            </form>
        </div>
    </div>
    <script src="js/cadastroEmpresa.js"></script>
</body>
</html>
