<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/admin.css">
    <title>Cadastro Serviço | Agenda System</title>
</head>
<body>
    <!-- ============================================================
     TELA 4: SERVIÇOS
     ============================================================ -->
    <div id="tela-servicos" class="tela ativa" hidden>
        <div class="auth-container auth-container--largo">
            <div class="passo-indicador">
                <span class="passo concluido">1. Empresa</span>
                <span class="passo-linha"></span>
                <span class="passo ativo">2. Serviços</span>
                <span class="passo-linha"></span>
                <span class="passo">3. Profissionais</span>
            </div>

            <h1 class="tela__titulo">Serviços oferecidos</h1>
            <p class="tela__subtitulo">Adicione os serviços que sua empresa realiza</p>

            <form id="form-servico" class="form-inline" novalidate>
                <div class="form-inline__campos">
                    <div class="campo">
                        <label for="srv-nome">Nome do serviço</label>
                        <input type="text" id="srv-nome" placeholder="Ex: Corte degradê" autocomplete="off">
                    </div>
                    <div class="campo">
                        <label for="srv-preco">Preço (R$)</label>
                        <input type="number" id="srv-preco" placeholder="0,00" min="0" step="0.01">
                    </div>
                    <div class="campo">
                        <label for="srv-tempo">Duração (min)</label>
                        <input type="number" id="srv-tempo" placeholder="30" min="5" step="5">
                    </div>
                    <div class="campo">
                        <label for="srv-foto">Imagem (3x4)</label>
                        <input type="file" id="srv-foto" accept="image/*">
                    </div>
                </div>
                <button type="button" class="btn-secundario" onclick="adicionarServico()">+ Adicionar serviço</button>
            </form>

            <div class="cards-lista" id="lista-cards-servicos">
                <p class="lista-vazia" id="vazia-servicos">Nenhum serviço adicionado ainda.</p>
            </div>

            <div class="nav-duplo">
                <button class="btn-ghost" onclick="irParaTela('tela-empresa')">← Voltar</button>
                <button class="btn-primario" onclick="salvarServicos()">Próximo →</button>
            </div>
        </div>
    </div>
    <script src="js/cadastroEmpresa.js"></script>
</body>
</html>
